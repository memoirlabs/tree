name: Release Announcement

on:
  workflow_dispatch:
    inputs:
      top_message:
        description: Optional message to place at the top of the announcement
        required: false
        type: string
      base:
        description: Optional base tag or commit. Defaults to the latest git tag.
        required: false
        type: string
      version:
        description: Optional version label. Defaults to package.json version.
        required: false
        type: string

jobs:
  announcement:
    name: Generate release announcement
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate announcement
        env:
          RELEASE_TOP_MESSAGE: ${{ inputs.top_message }}
          RELEASE_BASE: ${{ inputs.base }}
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          args=()
          if [ -n "$RELEASE_BASE" ]; then
            args+=(--base "$RELEASE_BASE")
          fi
          if [ -n "$RELEASE_VERSION" ]; then
            args+=(--version "$RELEASE_VERSION")
          fi
          bun run release:announcement -- "${args[@]}"

      - name: Upload announcement
        uses: actions/upload-artifact@v4
        with:
          name: release-announcement
          path: RELEASE_ANNOUNCEMENT.md
