name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    name: Bun CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install site dependencies
        working-directory: site
        run: bun install --frozen-lockfile

      - name: Run CI
        run: bun run ci
